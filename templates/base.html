<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Breast Cancer Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/simplex/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">🔬 Brustkrebs-Klassifizierung</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/eda">Datenanalyse</a>
                <a class="nav-link" href="/history">Verlauf</a>
                {% if session.patient_name %}
                    <a class="nav-link" href="/predict">Vorhersage</a>
                    <a class="nav-link" href="/patients">Patienten</a>
                    <a class="nav-link" href="/logout">Logout ({{ session.patient_name }})</a>
                {% else %}
                    <a class="nav-link" href="/register">Registrieren</a>
                    <a class="nav-link" href="/login">Login</a>
{% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
